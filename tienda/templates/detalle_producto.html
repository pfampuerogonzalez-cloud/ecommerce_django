{% extends "base.html" %}

{% block content %}
<h2>{{ producto.nombre }}</h2>

<div class="row mt-4">
    <div class="col-md-6">
        {% if producto.imagen %}
            <img src="{{ producto.imagen.url }}" class="img-fluid rounded shadow-sm" alt="{{ producto.nombre }}">
        {% else %}
            <div class="d-flex align-items-center justify-content-center h-100 text-muted" style="min-height:300px;background:#f8f9fa;border-radius:8px;">
                <span>Sin imagen</span>
            </div>
        {% endif %}
    </div>
    <div class="col-md-6">
        <h4 class="text-success fw-bold">${{ producto.precio }}</h4>
        <p class="mt-3">{{ producto.descripcion|default:"Sin descripción." }}</p>
        <a class="btn" href="{% url 'agregar_al_carrito' producto.id %}">Agregar al carrito</a>
        <a class="btn" style="background:#6c757d;" href="{% url 'lista_productos' %}">Volver al catálogo</a>
    </div>
</div>
{% endblock %}
